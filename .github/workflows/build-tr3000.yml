name: Build Cudy TR3000

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Firmware partition layout
        required: true
        default: ubootmod
        type: choice
        options:
          - stock
          - ubootmod

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
            xxd zlib1g-dev zstd

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: dl
          key: tr3000-dl-${{ hashFiles('feeds.conf.default', 'defconfig/cudy-tr3000-v1-*.config') }}
          restore-keys: tr3000-dl-

      - name: Build stock firmware
        if: inputs.profile == 'stock'
        env:
          PROFILE: stock
        run: ./build-tr3000.sh

      - name: Build U-Boot MOD firmware
        if: inputs.profile == 'ubootmod'
        env:
          PROFILE: ubootmod
        run: ./build-tr3000.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cudy-tr3000-${{ inputs.profile }}
          if-no-files-found: error
          retention-days: 14
          path: |
            bin/targets/mediatek/filogic/*cudy_tr3000-v1*
            bin/targets/mediatek/filogic/profiles.json
            bin/targets/mediatek/filogic/sha256sums
